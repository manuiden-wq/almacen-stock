<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Almacén</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f5f5f5; }
    .topbar { background: white; border-bottom: 1px solid #eee; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .topbar-title { font-size: 16px; font-weight: 600; color: #111; }
    .nav { display: flex; background: white; border-bottom: 1px solid #eee; }
    .nav-btn { flex: 1; padding: 10px 4px; font-size: 12px; color: #888; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
    .nav-btn.active { color: #111; border-bottom-color: #534AB7; font-weight: 600; }
    .screen { display: none; padding: 12px; }
    .screen.active { display: block; }
    .card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-ok { background: #EAF3DE; color: #3B6D11; }
    .badge-low { background: #FAEEDA; color: #854F0B; }
    .badge-out { background: #FCEBEB; color: #A32D2D; }
    .metric { background: #f9f9f9; border-radius: 8px; padding: 12px; text-align: center; }
    .metric-val { font-size: 24px; font-weight: 600; color: #111; }
    .metric-lbl { font-size: 12px; color: #888; margin-top: 2px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .btn { padding: 12px 16px; border-radius: 8px; border: 1px solid #ddd; background: white; color: #111; font-size: 14px; cursor: pointer; width: 100%; }
    .btn-primary { background: #534AB7; color: white; border-color: #534AB7; font-weight: 600; }
    .btn-primary:hover { background: #3C3489; }
    .input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; color: #111; margin-bottom: 10px; }
    .select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; color: #111; margin-bottom: 10px; }
    .label { font-size: 12px; color: #666; margin-bottom: 4px; display: block; }
    .section-title { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
    .prod-row { display: flex; align-items: center; justify-content: space-between; }
    .prod-name { font-size: 15px; font-weight: 600; color: #111; }
    .prod-unit { font-size: 12px; color: #888; }
    .prod-stock { font-size: 22px; font-weight: 700; }
    .mov-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .mov-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mov-entrada { background: #639922; }
    .mov-salida { background: #A32D2D; }
    .mov-info { flex: 1; }
    .mov-prod { font-size: 14px; font-weight: 600; color: #111; }
    .mov-meta { font-size: 12px; color: #888; }
    .mov-qty { font-size: 14px; font-weight: 600; }
    .mov-qty-entrada { color: #3B6D11; }
    .mov-qty-salida { color: #A32D2D; }
    .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 10px; }
    .alert-success { background: #EAF3DE; color: #3B6D11; }
    .alert-error { background: #FCEBEB; color: #A32D2D; }
    .login-wrap { padding: 40px 24px; }
    .login-title { font-size: 24px; font-weight: 700; color: #111; margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: #888; margin-bottom: 28px; }
    .tipo-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .tipo-btn { padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; text-align: center; }
    .tipo-btn.sel-entrada { border-color: #639922; background: #EAF3DE; }
    .tipo-btn.sel-salida { border-color: #A32D2D; background: #FCEBEB; }
    .loader { text-align: center; padding: 30px; color: #888; font-size: 14px; }
    .empty { text-align: center; padding: 30px; color: #888; font-size: 14px; }
  </style>
</head>
<body>
<div class="app">

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-wrap">
      <div style="font-size:40px;margin-bottom:16px">📦</div>
      <div class="login-title">Control de almacén</div>
      <div class="login-sub">Inicia sesión para acceder</div>
      <div id="login-alert"></div>
      <label class="label">Tu nombre (aparecerá en el historial)</label>
      <input class="input" id="login-name" placeholder="Ej: Juan, María..." />
      <label class="label">Email</label>
      <input class="input" id="login-email" type="email" placeholder="tu@email.com" />
      <label class="label">Contraseña</label>
      <input class="input" id="login-pass" type="password" placeholder="••••••••" />
      <button class="btn btn-primary" onclick="doLogin()">Entrar</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main-screen" style="display:none">
    <div class="topbar">
      <div class="topbar-title">📦 Almacén</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:12px;color:#888" id="topbar-user"></span>
        <button onclick="doLogout()" style="font-size:12px;color:#888;background:none;border:none;cursor:pointer">Salir</button>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="goTab('stock')" id="tab-stock">Stock</button>
      <button class="nav-btn" onclick="goTab('movimiento')" id="tab-movimiento">Movimiento</button>
      <button class="nav-btn" onclick="goTab('historial')" id="tab-historial">Historial</button>
      <button class="nav-btn" onclick="goTab('productos')" id="tab-productos">Productos</button>
    </div>

    <!-- STOCK -->
    <div id="screen-stock" class="screen active">
      <div class="grid2">
        <div class="metric"><div class="metric-val" id="met-total">-</div><div class="metric-lbl">Productos</div></div>
        <div class="metric"><div class="metric-val" id="met-bajo" style="color:#854F0B">-</div><div class="metric-lbl">Stock bajo</div></div>
      </div>
      <div class="section-title">Estado del stock</div>
      <div id="lista-stock"><div class="loader">Cargando...</div></div>
    </div>

    <!-- MOVIMIENTO -->
    <div id="screen-movimiento" class="screen">
      <div class="section-title">Registrar movimiento</div>
      <div id="mov-alert"></div>
      <div class="tipo-btns">
        <div class="tipo-btn sel-entrada" id="tbtn-entrada" onclick="selTipo('entrada')">
          <div style="font-size:13px;font-weight:600;color:#3B6D11">+ Entrada</div>
          <div style="font-size:11px;color:#639922">Añadir stock</div>
        </div>
        <div class="tipo-btn" id="tbtn-salida" onclick="selTipo('salida')">
          <div style="font-size:13px;font-weight:600;color:#A32D2D">- Salida</div>
          <div style="font-size:11px;color:#A32D2D">Retirar stock</div>
        </div>
      </div>
      <label class="label">Producto</label>
      <select class="select" id="mov-producto"><option value="">Cargando...</option></select>
      <label class="label">Cantidad</label>
      <input class="input" id="mov-cantidad" type="number" min="1" placeholder="Ej: 10" />
      <label class="label">Motivo (opcional)</label>
      <input class="input" id="mov-motivo" placeholder="Ej: Venta, Reposición..." />
      <button class="btn btn-primary" onclick="registrarMovimiento()">Registrar movimiento</button>
    </div>

    <!-- HISTORIAL -->
    <div id="screen-historial" class="screen">
      <div class="section-title">Últimos movimientos</div>
      <div id="lista-historial"><div class="loader">Cargando...</div></div>
    </div>

    <!-- PRODUCTOS -->
    <div id="screen-productos" class="screen">
      <div class="section-title">Añadir producto</div>
      <div id="prod-alert"></div>
      <label class="label">Nombre del producto</label>
      <input class="input" id="prod-nombre" placeholder="Ej: Cajas de cartón" />
      <label class="label">Descripción</label>
      <input class="input" id="prod-desc" placeholder="Ej: Cajas 40x30cm" />
      <label class="label">Unidad de medida</label>
      <input class="input" id="prod-unidad" value="unidades" />
      <label class="label">Stock inicial</label>
      <input class="input" id="prod-stock" type="number" min="0" placeholder="0" />
      <label class="label">Stock mínimo (alerta)</label>
      <input class="input" id="prod-minimo" type="number" min="0" placeholder="5" />
      <button class="btn btn-primary" onclick="crearProducto()">Añadir producto</button>
    </div>
  </div>

</div>
<script>
  const SUPA_URL = "https://vdstjefvvqrhcqaubzwr.supabase.co";
  const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkc3RqZWZ2dnFyaGNxYXViendyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTEzNDIsImV4cCI6MjA5MjI2NzM0Mn0.2g8vydBpA4Gb9yBC6QuZ9WUb4lMI8GXCgh4p-UqdCdA";

  let currentUserName = "";
  let tipoSeleccionado = "entrada";
  let productos = [];

  const H = {
    "Content-Type": "application/json",
    "apikey": SUPA_KEY,
    "Authorization": "Bearer " + SUPA_KEY
  };

  function setAlert(id, msg, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '<div class="alert alert-' + type + '">' + msg + '</div>';
    if (type === "success") setTimeout(() => { el.innerHTML = ""; }, 4000);
  }

  async function doLogin() {
    const name = document.getElementById("login-name").value.trim();
    const email = document.getElementById("login-email").value.trim();
    const pass = document.getElementById("login-pass").value;
    if (!name) { setAlert("login-alert","Escribe tu nombre","error"); return; }
    if (!email) { setAlert("login-alert","Escribe tu email","error"); return; }
    if (!pass) { setAlert("login-alert","Escribe tu contraseña","error"); return; }
    try {
      const r = await fetch(SUPA_URL + "/auth/v1/token?grant_type=password", {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPA_KEY },
        body: JSON.stringify({ email, password: pass })
      });
      const data = await r.json();
      if (data.access_token) {
        currentUserName = name;
        document.getElementById("topbar-user").textContent = name;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("main-screen").style.display = "";
        loadAll();
      } else {
        setAlert("login-alert", data.error_description || data.msg || "Credenciales incorrectas", "error");
      }
    } catch(e) {
      setAlert("login-alert", "Error de conexión: " + e.message, "error");
    }
  }

  function doLogout() {
    currentUserName = "";
    document.getElementById("main-screen").style.display = "none";
    document.getElementById("login-screen").style.display = "";
    document.getElementById("login-pass").value = "";
  }

  function goTab(tab) {
    ["stock","movimiento","historial","productos"].forEach(t => {
      document.getElementById("screen-"+t).classList.toggle("active", t===tab);
      document.getElementById("tab-"+t).classList.toggle("active", t===tab);
    });
    if (tab === "stock") loadStock();
    if (tab === "historial") loadHistorial();
    if (tab === "movimiento") loadProductosSelect();
  }

  function selTipo(tipo) {
    tipoSeleccionado = tipo;
    document.getElementById("tbtn-entrada").className = "tipo-btn" + (tipo==="entrada" ? " sel-entrada" : "");
    document.getElementById("tbtn-salida").className = "tipo-btn" + (tipo==="salida" ? " sel-salida" : "");
  }

  async function loadAll() {
    await loadProductos();
    loadStock();
  }

  async function loadProductos() {
    const r = await fetch(SUPA_URL + "/rest/v1/productos?select=*&order=nombre", { headers: H });
    productos = await r.json();
    if (!Array.isArray(productos)) productos = [];
  }

  async function loadStock() {
    await loadProductos();
    const el = document.getElementById("lista-stock");
    if (!productos.length) {
      el.innerHTML = '<div class="empty">No hay productos. Ve a Productos para añadir.</div>';
      document.getElementById("met-total").textContent = "0";
      document.getElementById("met-bajo").textContent = "0";
      return;
    }
    const bajos = productos.filter(p => p.stock_actual <= p.stock_minimo).length;
    document.getElementById("met-total").textContent = productos.length;
    document.getElementById("met-bajo").textContent = bajos;
    el.innerHTML = productos.map(p => {
      const badge = p.stock_actual === 0
        ? '<span class="badge badge-out">Sin stock</span>'
        : p.stock_actual <= p.stock_minimo
          ? '<span class="badge badge-low">Stock bajo</span>'
          : '<span class="badge badge-ok">OK</span>';
      const color = p.stock_actual === 0 ? "#A32D2D" : p.stock_actual <= p.stock_minimo ? "#854F0B" : "#3B6D11";
      return '<div class="card"><div class="prod-row"><div><div class="prod-name">' + p.nombre + '</div><div class="prod-unit">' + (p.descripcion||'') + ' · ' + p.unidad + '</div><div style="margin-top:6px">' + badge + '</div></div><div style="text-align:right"><div class="prod-stock" style="color:' + color + '">' + p.stock_actual + '</div><div style="font-size:11px;color:#888">Mín: ' + p.stock_minimo + '</div></div></div></div>';
    }).join("");
  }

  async function loadProductosSelect() {
    await loadProductos();
    const sel = document.getElementById("mov-producto");
    sel.innerHTML = productos.length
      ? '<option value="">Selecciona un producto...</option>' + productos.map(p => '<option value="' + p.id + '" data-stock="' + p.stock_actual + '">' + p.nombre + ' (stock: ' + p.stock_actual + ')</option>').join("")
      : '<option value="">No hay productos aún</option>';
  }

  async function loadHistorial() {
    const el = document.getElementById("lista-historial");
    const r = await fetch(SUPA_URL + "/rest/v1/movimientos?select=*,productos(nombre,unidad)&order=created_at.desc&limit=50", { headers: H });
    const movs = await r.json();
    if (!Array.isArray(movs) || !movs.length) {
      el.innerHTML = '<div class="empty">No hay movimientos registrados.</div>';
      return;
    }
    el.innerHTML = movs.map(m => {
      const fecha = new Date(m.created_at).toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
      return '<div class="mov-row"><div class="mov-dot mov-' + m.tipo + '"></div><div class="mov-info"><div class="mov-prod">' + (m.productos?.nombre||"Producto") + '</div><div class="mov-meta">' + fecha + ' · ' + (m.usuario||"-") + (m.motivo ? " · " + m.motivo : "") + '</div></div><div class="mov-qty mov-qty-' + m.tipo + '">' + (m.tipo==="entrada"?"+":"-") + m.cantidad + ' ' + (m.productos?.unidad||"") + '</div></div>';
    }).join("");
  }

  async function registrarMovimiento() {
    const pid = document.getElementById("mov-producto").value;
    const cant = parseInt(document.getElementById("mov-cantidad").value);
    const motivo = document.getElementById("mov-motivo").value.trim();
    if (!pid) { setAlert("mov-alert","Selecciona un producto","error"); return; }
    if (!cant || cant <= 0) { setAlert("mov-alert","Introduce una cantidad válida","error"); return; }
    const prod = productos.find(p => p.id === pid);
    if (tipoSeleccionado === "salida" && prod && cant > prod.stock_actual) {
      setAlert("mov-alert","Stock insuficiente. Actual: " + prod.stock_actual,"error"); return;
    }
    const nuevoStock = tipoSeleccionado === "entrada" ? prod.stock_actual + cant : prod.stock_actual - cant;
    await fetch(SUPA_URL + "/rest/v1/movimientos", {
      method: "POST", headers: { ...H, "Prefer": "return=minimal" },
      body: JSON.stringify({ producto_id: pid, tipo: tipoSeleccionado, cantidad: cant, motivo, usuario: currentUserName })
    });
    await fetch(SUPA_URL + "/rest/v1/productos?id=eq." + pid, {
      method: "PATCH", headers: { ...H, "Prefer": "return=minimal" },
      body: JSON.stringify({ stock_actual: nuevoStock })
    });
    setAlert("mov-alert","Registrado. Nuevo stock: " + nuevoStock,"success");
    document.getElementById("mov-cantidad").value = "";
    document.getElementById("mov-motivo").value = "";
    loadProductosSelect();
  }

  async function crearProducto() {
    const nombre = document.getElementById("prod-nombre").value.trim();
    const desc = document.getElementById("prod-desc").value.trim();
    const unidad = document.getElementById("prod-unidad").value.trim() || "unidades";
    const stock = parseInt(document.getElementById("prod-stock").value) || 0;
    const minimo = parseInt(document.getElementById("prod-minimo").value) || 0;
    if (!nombre) { setAlert("prod-alert","El nombre es obligatorio","error"); return; }
    const r = await fetch(SUPA_URL + "/rest/v1/productos", {
      method: "POST", headers: { ...H, "Prefer": "return=minimal" },
      body: JSON.stringify({ nombre, descripcion: desc, unidad, stock_actual: stock, stock_minimo: minimo })
    });
    if (r.ok || r.status === 201) {
      setAlert("prod-alert","Producto añadido correctamente","success");
      document.getElementById("prod-nombre").value = "";
      document.getElementById("prod-desc").value = "";
      document.getElementById("prod-stock").value = "";
      document.getElementById("prod-minimo").value = "";
      document.getElementById("prod-unidad").value = "unidades";
      loadProductos();
    } else {
      setAlert("prod-alert","Error al crear el producto","error");
    }
  }

  document.getElementById("login-pass").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
</script>
</body>
</html>
